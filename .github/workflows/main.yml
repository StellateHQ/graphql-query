name: CI

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ./target
          key: v1-gql-query-rs-${{ runner.os }}-${{ hashFiles('./Cargo.lock') }}

      - name: Check
        run: cargo check

      - name: Check WASM
        run: cargo check --target wasm32-unknown-unknown

      - name: Benchmarks
        run: cargo bench

      - name: Test (dev)
        run: cargo test

      - name: Test (release)
        run: cargo test --release
